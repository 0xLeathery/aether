<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&amp;display=swap');
    .prompt { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-weight: 700; font-size: 48px; }
    .wordmark { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-weight: 500; font-size: 48px; }
    .cursor-bar { }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor-bar { animation: blink 1.1s step-end infinite; }
  </style>
  <defs>
    <!-- Subtle glow for the prompt -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background terminal window -->
  <rect x="0" y="0" width="420" height="100" rx="12" fill="#0F172A"/>
  <!-- Window dots -->
  <circle cx="20" cy="16" r="5" fill="#EF4444" opacity="0.8"/>
  <circle cx="36" cy="16" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="52" cy="16" r="5" fill="#22C55E" opacity="0.8"/>
  <!-- >_ prompt with glow -->
  <text x="24" y="72" class="prompt" fill="#6EE7B7" filter="url(#glow)">&gt;_</text>
  <!-- Aether wordmark -->
  <text x="100" y="72" class="wordmark" fill="#E2E8F0">Aether</text>
  <!-- Blinking cursor -->
  <rect x="342" y="40" width="3" height="36" rx="1" fill="#6EE7B7" class="cursor-bar"/>
</svg>
